<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página do Grêmio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            border: 10px solid red; /* Sua cor padrão */
        }

        .container {
            border: 2px solid #333;
            padding: 30px;
            background: rgba(20, 20, 20, 0.9);
            border-radius: 8px;
        }

        /* Frase principal menor */
        .frase-ofensiva {
            font-size: 1.8rem;
            font-weight: bold;
            color: red; /* Sua cor padrão */
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .divisor {
            height: 1px;
            background: #444;
            width: 80%;
            margin: 10px auto;
        }

        /* Gremio menor e mais limpo */
        .gremio-text {
            font-size: 2.5rem;
            font-weight: 900;
            color: #005da4;
            text-transform: uppercase;
            text-shadow: 2px 2px 0px #fff;
        }

        .sub-link {
            display: block;
            margin-top: 15px;
            color: #888;
            font-size: 0.8rem;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <p class="frase-ofensiva">pau no cu da protagonista</p>
        <div class="divisor"></div>
        <h1 class="gremio-text">VAI GREMIO</h1>
        <a href="#" class="sub-link">imortal tricolor</a>
    </div>

</body>
</html>
